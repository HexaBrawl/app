name: Weekly_Activity_Report

on:
  schedule:
    - cron: '0 6 * * 1'  # jeden Montag 06:00 UTC
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    
    permissions:
      issues: write  
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # komplette Git-History für git log

      - name: Kalenderwoche ermitteln
        id: kw
        run: echo "value=$(date +%V)" >> $GITHUB_OUTPUT

      - name: Activity Report erstellen
        run: |
          SINCE=$(date -d '7 days ago' '+%Y-%m-%dT%H:%M:%SZ')
          SINCE_GIT=$(date -d '7 days ago' '+%Y-%m-%d')

          COMMITS=$(gh api "repos/${{ github.repository }}/commits?since=$SINCE&per_page=100" --jq 'length')

          PRS_OPENED=$(gh api "repos/${{ github.repository }}/pulls?state=all&per_page=100" \
            --jq "[.[] | select(.created_at >= \"$SINCE\")] | length")

          PRS_MERGED=$(gh api "repos/${{ github.repository }}/pulls?state=closed&per_page=100" \
            --jq "[.[] | select(.merged_at != null and .merged_at >= \"$SINCE\")] | length")

          ISSUES_OPENED=$(gh api "repos/${{ github.repository }}/issues?state=all&per_page=100" \
            --jq "[.[] | select(.pull_request == null and .created_at >= \"$SINCE\")] | length")

          AUTHOR_STATS=$(git log --since="$SINCE_GIT" --format="%aN" \
            | sort | uniq -c | sort -rn \
            | awk '{print "| 👤 " $2 " " $3 " | " $1 " |"}')

          DAILY_STATS=$(git log --since="$SINCE_GIT" --format="%ad" --date=short \
            | sort | uniq -c \
            | awk '{print "| 📅 " $2 " | " $1 " |"}')

          gh issue create \
            --title "📊 Weekly Activity Report — KW ${{ steps.kw.outputs.value }} [Backend]" \
            --body "## 📊 Weekly Activity Report — KW ${{ steps.kw.outputs.value }}
          > Automatisch generiert am $(date '+%d.%m.%Y um %H:%M Uhr') · Zeitraum: letzte 7 Tage

          ---

          ## 📈 Übersicht
          | Metrik | Anzahl |
          |--------|--------|
          | 🔨 Commits | $COMMITS |
          | 🔀 PRs geöffnet | $PRS_OPENED |
          | ✅ PRs gemerged | $PRS_MERGED |
          | 🐛 Issues geöffnet | $ISSUES_OPENED |

          ---

          ## 👥 Commits pro Autor
          | Autor | Commits |
          |-------|---------|
          $AUTHOR_STATS

          ---

          ## 📅 Commits pro Tag
          | Datum | Commits |
          |-------|---------|
          $DAILY_STATS

          ---
          📁 Repo: \${{ github.repository }}
          🔗 [Alle Commits](https://github.com/\${{ github.repository }}/commits/main) · [Alle PRs](https://github.com/\${{ github.repository }}/pulls) · [Alle Issues](https://github.com/\${{ github.repository }}/issues)" \
            --label "report,weekly,planning"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}